[tool.uv.workspace]
members = ["specops_lib", "specialagent", "specops"]

[dependency-groups]
dev = [
    "detect-secrets>=1.5.0",
    "pre-commit>=4.5.1",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "httpx>=0.27.0",
    "ruff>=0.4.0",
    "mypy>=1.10.0",
]

[tool.uv.sources]
specops_lib = { workspace = true }
specialagent = { workspace = true }
specops = { workspace = true }

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "PLC0415", "S"]
ignore = [
    "E501",   # line-too-long: handled by formatter
    "S101",   # use of assert: needed in tests
    "S603",   # subprocess-without-shell-equals-true: too broad for this codebase
    "S607",   # start-process-with-partial-path: too broad
    "S105",   # possible hardcoded password: too many false positives on field names
    "S106",   # hardcoded-password-func-arg: too many false positives on test fixtures
    "S104",   # binding to all interfaces: intentional for server (0.0.0.0)
    "S108",   # insecure /tmp usage: false positives on test fixtures and known patterns
    "S110",   # try-except-pass: pre-existing pattern; addressed separately
    "S112",   # try-except-continue: pre-existing pattern in tool execution paths
    "S608",   # SQL injection via string: table names are controlled constants, not user input
    "S606",   # start-process-without-shell: intentional in CLI commands
]

[tool.ruff.lint.per-file-ignores]
# CLI entry points: lazy imports reduce startup latency for --help / simple commands
"specops/cli.py" = ["PLC0415"]
"specialagent/cli.py" = ["PLC0415"]
# Channel manager: plugin pattern — only import enabled channels (SDKs may be missing)
"specops_lib/channels/manager.py" = ["PLC0415"]
# Individual channels: optional third-party SDKs wrapped in try/except ImportError
"specops_lib/channels/telegram.py" = ["PLC0415"]
"specops_lib/channels/feishu.py" = ["PLC0415"]
"specops_lib/channels/whatsapp.py" = ["PLC0415"]
"specops_lib/channels/zalouser.py" = ["PLC0415"]
# Factory pattern: only import the selected runtime backend
"specops/core/runtimes/factory.py" = ["PLC0415"]
# Optional docker SDK (admin-docker extra)
"specops/core/runtimes/docker.py" = ["PLC0415"]
# Local runtime: platform-specific imports (fcntl/termios for PTY resize)
"specops/core/runtimes/local.py" = ["PLC0415"]
# Deps: lazy registry imports (optional specops_lib)
"specops/deps.py" = ["PLC0415"]
# Terminal API: factory pattern for terminal backends (docker/local)
"specops/apis/terminal.py" = ["PLC0415"]
# Optional cron dependency (croniter try/except)
"specialagent/core/cron/service.py" = ["PLC0415"]
# MCP: streamable_http_client conditional import (may not exist in all mcp versions)
"specialagent/agent/tools/mcp.py" = ["PLC0415"]
# Worker: storage from specops_lib when AGENT_ID is set
"specialagent/worker/resolve.py" = ["PLC0415"]
# Config loader: lazy import yaml/json for faster CLI startup
"specialagent/core/config/loader.py" = ["PLC0415"]
# Agent loop: conditional tool imports based on config
"specialagent/agent/loop.py" = ["PLC0415"]
# Entry point discovery: importlib.metadata in function
"specialagent/agent/tools/registry.py" = ["PLC0415"]
# Control client: lazy httpx for pull_config
"specialagent/control/client.py" = ["PLC0415"]
# Admin client: no in-function imports after refactor (keep exemption for safety)
"specialagent/core/admin.py" = ["PLC0415"]
# Worker handlers: lazy config imports (optional deps)
"specialagent/worker/handlers/admin.py" = ["PLC0415"]
# Heartbeat: optional croniter/zoneinfo
"specialagent/core/heartbeat.py" = ["PLC0415"]
# Provision: lazy yaml import
"specialagent/worker/provision.py" = ["PLC0415"]
# Storage: factory pattern for S3 backend
"specops_lib/storage/local.py" = ["PLC0415"]
"specops_lib/storage/s3.py" = ["PLC0415"]
# Database: lazy storage import to avoid circular deps
"specops/core/database.py" = ["PLC0415"]
# Plan artifacts: lazy database import
"specops/core/store/plan_artifacts.py" = ["PLC0415"]
# Web tool: camelCase parameter names match JSON schema
"specialagent/agent/tools/web.py" = ["N803"]
# Plan tool: optional pypdf for PDF extraction
"specialagent/agent/tools/plan.py" = ["PLC0415"]
# Tests: fixtures use in-function imports to respect monkeypatched env vars before import
"tests/test_specops_api.py" = ["PLC0415"]
"tests/test_specops_multiuser.py" = ["PLC0415"]
"tests/test_specops_domain.py" = ["PLC0415"]
"tests/test_plan_templates.py" = ["PLC0415"]
"tests/test_plan_review.py" = ["PLC0415"]
"tests/test_plan_columns.py" = ["PLC0415"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.run]
source = ["specops_lib", "specialagent", "specops"]
omit = ["*/tests/*", "*/__pycache__/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 25

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = false
strict_optional = true
check_untyped_defs = true
# Start non-strict — tighten over time
disallow_untyped_defs = false
